# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.1
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: /home/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 7098
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: 139.9.114.245
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password: xingtu@2026
    # 连接超时时间
    timeout: 20s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /ajadmin-api

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,www.xingyuzl.com

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice,/ai/intelligence/**,/plat/**
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# MinIO（AI 实训文件上传，未配置 endpoint 时上传接口会提示未配置）
minio:
  endpoint: ${MINIO_ENDPOINT:http://39.107.111.137:9000}
  access-key: ${MINIO_ACCESS_KEY:minio}
  secret-key: ${MINIO_SECRET_KEY:xingyu@2026}
  bucket-name: ${MINIO_BUCKET:ai-intelligence}
  project-file-bucket: ${MINIO_PROJECT_FILE_BUCKET:ai-intelligence}

# xingyu 集成（密钥务必用环境变量，勿提交真实 Key）
xingyu:
  custom-resource-prefix-path:
  ai-chat:
    enabled: true
    model: qwen3.5-plus
    # 文档 PRD 归纳走 DashScope 原生 Generation（与 Testmain 一致），默认 qwen-plus
    dashscope-generation-model: qwen-plus
    api-key: sk-0fcfdb781d2440cd974b1cd2f2159b11
    api-host: https://dashscope.aliyuncs.com/compatible-mode/v1
    timeout: 60
  ai-rag:
    allow-sensitive-nodes: sql,stdio
    embed-store:
      host: ${XINGYU_PG_HOST:39.107.111.137}
      port: ${XINGYU_PG_PORT:5431}
      database: ${XINGYU_PG_DATABASE:ai_db}
      user: ${XINGYU_PG_USER:postgres}
      password: ${XINGYU_PG_PASSWORD:xingyu@2026}
      table: ${XINGYU_PG_EMBED_TABLE:ai_embeddings}

# 教学：学员导入时写入 sys_user 并绑定角色（role_key 须与库中 sys_role 一致，默认 student）
# 平台教师：创建时同步 sys_user，默认密码 123456；role_key 须与库中 sys_role 一致（默认 teacher）
ai:
  teach:
    student-role-key: student
  plat:
    teacher-role-key: teacher
